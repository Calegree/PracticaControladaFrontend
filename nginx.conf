server {
    listen 80;
    server_name localhost;

    # --- Static files (React SPA) ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy: Backend API (must come before /agents-api) ---
    location /api/v1/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Proxy: Agents microservice ---
    # Frontend calls /agents-api/orchestrate → agents:8000/api/orchestrate
    location /agents-api/ {
        proxy_pass http://agents:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for AI agent responses
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
